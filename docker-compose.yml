# xangi-logomix: Slack-only instance
x-common: &common
  restart: unless-stopped
  volumes:
    # Claude Code CLI credentials (instance-specific volume)
    - claude-data:/home/node/.claude
    # Codex CLI credentials (instance-specific volume)
    - codex-data:/home/node/.codex
    # Workspace (agent working directory)
    - ${WORKSPACE_PATH:-/home/oodake/ghq/github.com/LogomixBio/bd-bot}:/workspace
    # Git config
    - ~/.gitconfig:/home/node/.gitconfig:ro
  environment: &common-env
    # GitHub CLI (authenticated via GH_TOKEN env var)
    - GH_TOKEN=${GH_TOKEN:-}
    - NODE_ENV=production
    # Slack
    - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    - SLACK_ALLOWED_USER=${SLACK_ALLOWED_USER:-}
    - SLACK_AUTO_REPLY_CHANNELS=${SLACK_AUTO_REPLY_CHANNELS:-}
    - SLACK_REPLY_IN_THREAD=${SLACK_REPLY_IN_THREAD:-true}
    - SLACK_STREAMING=${SLACK_STREAMING:-true}
    - SLACK_SHOW_THINKING=${SLACK_SHOW_THINKING:-true}
    # Common
    - WORKSPACE_PATH=/workspace
    - SKIP_PERMISSIONS=${SKIP_PERMISSIONS:-true}
    # Agent
    - AGENT_BACKEND=${AGENT_BACKEND:-claude-code}
    - AGENT_MODEL=${AGENT_MODEL:-}
    # Scheduler data directory
    - DATA_DIR=/workspace/.xangi
    # Disable scheduler to avoid duplicate execution with other instances
    - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-false}
    - STARTUP_ENABLED=${STARTUP_ENABLED:-false}

services:
  xangi-logomix:
    <<: *common
    build: .
    container_name: xangi-logomix
    ports:
      - "8081:8080"

volumes:
  claude-data:
    name: xangi-logomix_claude-data
  codex-data:
    name: xangi-logomix_codex-data
